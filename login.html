<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0066cc">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Logos flutuando na diagonal */
        .logos-bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .logo-float {
            position: absolute;
            opacity: 0;
            animation: floatDiagonal linear infinite;
            filter: brightness(10) opacity(0.13);
            width: 72px;
        }

        @keyframes floatDiagonal {
            0%   { transform: translate(0, 0)   rotate(-15deg); opacity: 0;    }
            8%   { opacity: 1; }
            92%  { opacity: 1; }
            100% { transform: translate(320px, -110vh) rotate(-15deg); opacity: 0; }
        }

        /* Cada logo começa numa posicao horizontal diferente e tem duracao/delay variados */
        .logo-float:nth-child(1)  { left:  2%; bottom: -80px; width: 56px; animation-duration: 14s; animation-delay:  0s; }
        .logo-float:nth-child(2)  { left: 10%; bottom: -80px; width: 80px; animation-duration: 17s; animation-delay:  2s; }
        .logo-float:nth-child(3)  { left: 20%; bottom: -80px; width: 60px; animation-duration: 12s; animation-delay:  5s; }
        .logo-float:nth-child(4)  { left: 30%; bottom: -80px; width: 90px; animation-duration: 19s; animation-delay:  1s; }
        .logo-float:nth-child(5)  { left: 42%; bottom: -80px; width: 64px; animation-duration: 15s; animation-delay:  7s; }
        .logo-float:nth-child(6)  { left: 54%; bottom: -80px; width: 75px; animation-duration: 13s; animation-delay:  3s; }
        .logo-float:nth-child(7)  { left: 62%; bottom: -80px; width: 55px; animation-duration: 18s; animation-delay:  9s; }
        .logo-float:nth-child(8)  { left: 72%; bottom: -80px; width: 85px; animation-duration: 11s; animation-delay:  6s; }
        .logo-float:nth-child(9)  { left: 82%; bottom: -80px; width: 65px; animation-duration: 16s; animation-delay:  4s; }
        .logo-float:nth-child(10) { left: 91%; bottom: -80px; width: 70px; animation-duration: 20s; animation-delay: 11s; }
    </style>
</head>
<body>

    <!-- Logos flutuando no fundo -->
    <div class="logos-bg">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
        <img class="logo-float" src="logo-default.png" alt="">
    </div>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="logo-default.png" alt="Logo" style="height:60px">
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        E-mail
                    </label>
                    <input type="email" id="email" placeholder="seu@email.com" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Senha
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember">
                        <span>Lembrar de mim</span>
                    </label>
                    <a href="#" class="forgot-password">Esqueci a senha</a>
                </div>

                <button type="submit" class="btn-login">
                    <span id="btnText">Entrar</span>
                    <i class="fas fa-spinner fa-spin" id="btnLoader" style="display: none;"></i>
                </button>
            </form>
        </div>

        <div class="background-animation">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
    </div>

<script type="module" src="login.js"></script>
</body>
</html>
